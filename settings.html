<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - PPE Safety</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        .settings-grid { display: grid; grid-template-columns: 250px 1fr; gap: 2rem; }
        .settings-nav {
            display: flex; flex-direction: column; gap: 0.5rem; border-right: 1px solid var(--border-color); padding-right: 2rem;
        }
        .settings-nav a {
            color: var(--text-secondary); text-decoration: none; padding: 0.75rem 1rem; border-radius: 8px; font-weight: 500; transition: var(--transition-fast);
        }
        .settings-nav a.active { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); }
        .settings-nav a:hover:not(.active) { color: var(--text-primary); }
        .settings-section {
            background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 2rem; margin-bottom: 2rem;
        }
        .settings-section h3 { margin-bottom: 1.5rem; font-size: 1.25rem; font-family: var(--font-heading); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input, .form-group select {
            width: 100%; max-width: 400px; padding: 0.75rem 1rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color);
            color: var(--text-primary); border-radius: 8px; outline: none; font-family: var(--font-body);
        }
        .form-group input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 0 2px rgba(0, 240, 255, 0.1); }
        .toggle-switch { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .toggle-slider {
            width: 40px; height: 22px; background: rgba(255,255,255,0.1); border-radius: 12px; position: relative; transition: var(--transition-fast);
        }
        .toggle-slider::after {
            content: ''; position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: var(--transition-fast);
        }
        .toggle-switch.on .toggle-slider { background: var(--accent-cyan); }
        .toggle-switch.on .toggle-slider::after { transform: translateX(18px); }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="brand">
                <div class="logo">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" stroke="#00F0FF" />
                        <circle cx="12" cy="12" r="4" fill="#00F0FF" />
                    </svg>
                </div>
                <h2>SafeSight</h2>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="live-inference.html">Live Inference</a></li>
                <li><a href="model-hub.html">Model Hub</a></li>
                <li class="active"><a href="settings.html">Settings</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="header">
                <div class="title-area">
                    <h1>Settings</h1>
                    <p class="subtitle">System preferences and integrations.</p>
                </div>
                <div class="header-actions">
                    <button class="primary-btn">Save Changes</button>
                    <div class="profile">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff" alt="User Profile">
                    </div>
                </div>
            </header>

            <div class="content-grid" style="padding-top: 2rem;">
                <div class="settings-grid">
                    <!-- Internal Nav -->
                    <div class="settings-nav">
                        <a href="#" class="active">General</a>
                        <a href="#">Alert Thresholds</a>
                        <a href="#">Integrations</a>
                        <a href="#">Security</a>
                    </div>
                    
                    <!-- Settings Content -->
                    <div class="settings-forms">
                        <div class="settings-section">
                            <h3>Roboflow Integration</h3>
                            <div class="form-group">
                                <label>Roboflow Workspace ID</label>
                                <input type="text" value="ppe-detection-lab">
                            </div>
                            <div class="form-group">
                                <label>API Key</label>
                                <input type="password" value="rf_abc1234567890">
                            </div>
                        </div>

                        <div class="settings-section">
                            <h3>Detection Preferences</h3>
                            <div class="form-group">
                                <label>Minimum Confidence Threshold (%)</label>
                                <input type="number" value="70">
                            </div>
                            <div class="form-group">
                                <div class="toggle-switch on" onclick="this.classList.toggle('on')">
                                    <div class="toggle-slider"></div>
                                    <span style="font-weight: 500;">Enable Live Alerts</span>
                                </div>
                                <p style="color: var(--text-secondary); font-size: 0.8rem; margin-top: 6px; margin-left: 50px;">Push notification upon missing PPE detection.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
